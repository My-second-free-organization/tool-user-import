version: '3.8'
services:
  api:
    build: .
    ports: ["8080:8080"]
    environment: { DATABASE_URL: "postgres://flowforge:flowforge@postgres:5432/flowforge", REDIS_URL: "redis://redis:6379" }
    depends_on: [postgres, redis]
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: flowforge, POSTGRES_USER: flowforge, POSTGRES_PASSWORD: flowforge }
  redis:
    image: redis:7-alpine
